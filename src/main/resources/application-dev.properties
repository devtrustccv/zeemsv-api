spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/db_zeemsv}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
zeemsv.datasource.igrp.url=${IGRP_DB_URL:jdbc:postgresql://localhost:5432/zeemsv_igrp_db}
zeemsv.datasource.igrp.username=${IGRP_DB_USERNAME:postgres}
zeemsv.datasource.igrp.password=${IGRP_DB_PASSWORD:postgres}
zeemsv.datasource.igrp.driver-class-name=org.postgresql.Driver
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
