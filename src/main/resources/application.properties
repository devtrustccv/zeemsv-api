spring.application.name=zeemsv-api
spring.profiles.active=dev
server.port=8086
server.servlet.context-path=/zeemsv-api

spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_schema=public
spring.jpa.hibernate.ddl-auto=none

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.out-of-order=true
spring.flyway.schemas=public
spring.flyway.locations=classpath:db/migration

# BD principal (db_zeemsv)
spring.datasource.url=jdbc:postgresql://localhost:5432/db_zeemsv
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# BD secundaria IGRP (zeemsv_igrp_db)
zeemsv.datasource.igrp.url=jdbc:postgresql://localhost:5432/zeemsv_igrp_db
zeemsv.datasource.igrp.username=postgres
zeemsv.datasource.igrp.password=postgres
zeemsv.datasource.igrp.driver-class-name=org.postgresql.Driver

spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true

springdoc.swagger-ui.path=/swagger-ui.html
management.endpoints.web.exposure.include=health,info

spring.jackson.property-naming-strategy=SNAKE_CASE

