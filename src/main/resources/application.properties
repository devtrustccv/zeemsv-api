spring.application.name=zeemsv-api
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
server.port=${SERVER_PORT:8086}
server.servlet.context-path=${SERVER_CONTEXT_PATH:/zeemsv-api}
server.forward-headers-strategy=${SERVER_FORWARD_HEADERS_STRATEGY:framework}

spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_schema=public
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}

spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.baseline-on-migrate=${FLYWAY_BASELINE_ON_MIGRATE:true}
spring.flyway.out-of-order=${FLYWAY_OUT_OF_ORDER:true}
spring.flyway.schemas=public
spring.flyway.locations=classpath:db/migration

# BD principal
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/db_zeemsv_new}
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# BD secundaria IGRP (zeemsv_igrp_db)
zeemsv.datasource.igrp.url=${IGRP_DB_URL:jdbc:postgresql://localhost:5432/zeemsv_igrp_db}
zeemsv.datasource.igrp.username=${IGRP_DB_USERNAME:postgres}
zeemsv.datasource.igrp.password=${IGRP_DB_PASSWORD:postgres}
zeemsv.datasource.igrp.driver-class-name=org.postgresql.Driver

spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true

springdoc.swagger-ui.path=/swagger-ui.html
management.endpoints.web.exposure.include=health,info

spring.jackson.property-naming-strategy=SNAKE_CASE

application.session.jwt-secret=${SESSION_JWT_SECRET:01234567890123456789012345678901}
application.session.jwt-expiration-in-hours=${SESSION_JWT_EXPIRATION_IN_HOURS:8}
application.session.otp-expiration-in-minutes=${SESSION_OTP_EXPIRATION_IN_MINUTES:5}
application.autentika.user-info-url=${AUTENTIKA_USER_INFO_URL:}
application.openapi.server-url=${OPENAPI_SERVER_URL:}
application.openapi.force-https-hosts=${OPENAPI_FORCE_HTTPS_HOSTS:zeemsv-sta.uniteltmais.cv}

application.mail.enabled=${MAIL_ENABLED:false}
application.mail.from=${MAIL_FROM:no-reply@zeemsv.cv}
application.mail.otp-subject=${MAIL_OTP_SUBJECT:Codigo de verificacao ZEEMSV}

spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:true}

zeemsv.integration.enabled=true
zeemsv.integration.pesquisa-cni.enabled=${PESQUISA_CNI_ENABLED:true}
zeemsv.integration.pesquisa-cni.url=${PESQUISA_CNI_URL:https://gateway-pdex.gov.cv/t/sniac.gov/PesquisaCNI/1.0.0/pesquisa_cni}
zeemsv.integration.pesquisa-cni.authorization=${PESQUISA_CNI_AUTHORIZATION:}
zeemsv.integration.pesquisa-nif.enabled=${PESQUISA_NIF_ENABLED:true}
zeemsv.integration.pesquisa-nif.url=${PESQUISA_NIF_URL:https://gateway-pdex.gov.cv/consultanif/1.0.0/detalhesPessoaOp}
zeemsv.integration.pesquisa-nif.authorization=${PESQUISA_NIF_AUTHORIZATION:}
zeemsv.integration.pesquisa-sirc.enabled=${PESQUISA_SIRC_ENABLED:true}
zeemsv.integration.pesquisa-sirc.url=${PESQUISA_SIRC_URL:}
zeemsv.integration.pesquisa-sirc.authorization=${PESQUISA_SIRC_AUTHORIZATION:}
zeemsv.integration.pesquisa-sirc.nif-param=${PESQUISA_SIRC_NIF_PARAM:NUM_NIF}
zeemsv.security.jwt-secret=${JWT_SECRET:change-me}
